services:
  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["full"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./volumes/qdrant:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:latest
    profiles: ["full"]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./volumes/neo4j:/data
    restart: unless-stopped

  api:
    build:
      context: .
      args:
        INSTALL_FULL: ${INSTALL_FULL:-false}
    command: ["uvicorn", "hackathon_project.app.api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: documents
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
      KG_BACKEND: ${KG_BACKEND:-auto}
      DATA_DIR: /data
      METADATA_DB_PATH: /data/outbox.sqlite3
      CATALOG_DB_PATH: /data/catalog.sqlite3
      DIRECT_QDRANT_PROJECTION: "false"
      RETRIEVAL_MODE: bm25
      ENABLE_LOCAL_EMBEDDINGS: "false"
      EAGER_LOCAL_EMBEDDINGS: "false"
      RETRIEVAL_QUERY_EXPANSION: "true"
      ENABLE_LLM: "false"
      LLM_PROVIDER: none
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b-instruct}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-20}
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  ui:
    build:
      context: .
      args:
        INSTALL_FULL: ${INSTALL_FULL:-false}
    command: ["streamlit", "run", "/code/hackathon_project/app/ui.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    ports:
      - "8501:8501"
    environment:
      API_BASE: http://api:8000
    depends_on:
      - api
    restart: unless-stopped
